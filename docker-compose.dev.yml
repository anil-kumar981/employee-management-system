version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ems-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employees_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employees_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ems-app-dev
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: python main.py
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/employees_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
