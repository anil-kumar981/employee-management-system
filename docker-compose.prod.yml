version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ems-app-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
    command: python main.py
